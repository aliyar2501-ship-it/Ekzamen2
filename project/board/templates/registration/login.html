{% extends 'board/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center fw-bold mb-4">
                    <i class="fa-solid fa-right-to-bracket text-primary me-2"></i> Вход в систему
                </h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger rounded-3" role="alert">
                        <i class="fa-solid fa-circle-xmark me-2"></i> Неверное имя пользователя или пароль.
                    </div>
                    {% endif %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-muted">
                            {{ field.label }}
                        </label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-control rounded-3" required>
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold mt-3">
                        Войти <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Ещё нет аккаунта? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
